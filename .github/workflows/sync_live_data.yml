name: Sync Live Data

# Runs twice daily — 1 hour after The_Regulated_Friction_Project's pipeline
# runs at 08:00 and 20:00 UTC, giving it time to finish first.
on:
  schedule:
    - cron: '0 9,21 * * *'
  workflow_dispatch: # Manual trigger button in GitHub Actions

permissions:
  contents: write

jobs:
  sync-and-verify:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout this repository ────────────────────────────────
      - name: Checkout OSINT_ChatBot
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # ── 2. Clone The_Regulated_Friction_Project once; sync output/ ──
      #       and _AI_CONTEXT_INDEX/ from the same clone.
      - name: Clone and sync from The_Regulated_Friction_Project
        run: |
          set -euo pipefail

          echo "::group::Cloning The_Regulated_Friction_Project (depth=1)"
          git clone --depth=1 \
            https://github.com/Leerrooy95/The_Regulated_Friction_Project.git \
            /tmp/rfp_clone
          echo "::endgroup::"

          echo "::group::Staging output/ (intelligence pipeline results)"
          mkdir -p _staging/output
          if [ ! -d "/tmp/rfp_clone/output" ]; then
            echo "::error::Source output/ directory not found in The_Regulated_Friction_Project clone"
            exit 1
          fi
          # Copy all non-.gitkeep files from the source output/ folder
          find /tmp/rfp_clone/output -maxdepth 1 -type f ! -name '.gitkeep' \
            -exec cp {} _staging/output/ \;
          echo "::endgroup::"

          echo "::group::Syncing _AI_CONTEXT_INDEX/ (baseline knowledge files)"
          # Copy all files from source, excluding the locally-generated digest
          rsync -a \
            --exclude='LIVE_INTELLIGENCE_DIGEST.md' \
            --exclude='PROFILE_README.md' \
            /tmp/rfp_clone/_AI_CONTEXT_INDEX/ \
            _AI_CONTEXT_INDEX/
          echo "::endgroup::"

          rm -rf /tmp/rfp_clone

          # Remove any empty files from failed copies
          find _staging -type f -empty -delete

          echo "✅ Data synced from The_Regulated_Friction_Project."
          echo "--- Staged output files ---"
          ls -la _staging/output/ || echo "No files staged"
          echo "--- Top-level AI context files ---"
          ls _AI_CONTEXT_INDEX/*.md 2>/dev/null | head -20 || echo "No markdown files found in _AI_CONTEXT_INDEX"

      # ── 3. Validate all fetched data ───────────────────────────────
      - name: Validate fetched data
        run: |
          python scripts/validate_sync.py _staging

      # ── 4. Copy verified data to clean _LIVE_DATA/ folder ─────────
      - name: Update clean _LIVE_DATA folder
        run: |
          set -euo pipefail

          # Wipe old output data to keep the folder clean
          rm -rf _LIVE_DATA/output
          mkdir -p _LIVE_DATA/output

          # Copy verified output data
          if [ -d "_staging/output" ]; then
            cp -r _staging/output/. _LIVE_DATA/output/
          fi

          # Copy manifest produced by validate_sync.py
          if [ -f "_staging/manifest.json" ]; then
            cp _staging/manifest.json _LIVE_DATA/manifest.json
          fi

          echo "✅ _LIVE_DATA/ updated with verified data."
          echo "--- Contents ---"
          find _LIVE_DATA -type f | head -50

      # ── 5. Generate knowledge-base digest ──────────────────────────
      - name: Generate LIVE_INTELLIGENCE_DIGEST.md
        run: |
          python scripts/generate_digest.py _LIVE_DATA _AI_CONTEXT_INDEX

      # ── 6. Clean up staging ────────────────────────────────────────
      - name: Clean up staging directory
        run: rm -rf _staging

      # ── 7. Commit and push ─────────────────────────────────────────
      - name: Commit and Push Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add _LIVE_DATA/ _AI_CONTEXT_INDEX/

          if ! git diff --cached --quiet; then
            git commit -m "🤖 Twice-daily sync: live intelligence data + digest update"

            # Robust push with retry
            MAX_RETRIES=5
            for i in $(seq 1 $MAX_RETRIES); do
              echo "--- Push attempt $i of $MAX_RETRIES ---"

              git fetch origin main

              if ! git merge origin/main --no-edit --strategy-option=ours; then
                echo "::warning::Merge failed on attempt $i, retrying..."
                git merge --abort 2>/dev/null || true
                sleep $((i * 2))
                continue
              fi

              if git push origin main; then
                echo "✅ Push succeeded on attempt $i"
                exit 0
              fi

              echo "::warning::Push rejected on attempt $i. Retrying..."
              sleep $((i * 2))
            done

            echo "::error::Failed to push after $MAX_RETRIES attempts"
            exit 1
          else
            echo "No new data changes to commit."
          fi
