name: Sync Live Data

# Runs twice daily — 1 hour after Live_Trackers' pipeline runs at
# 08:00 and 20:00 UTC, giving them time to finish first.
on:
  schedule:
    - cron: '0 9,21 * * *'
  workflow_dispatch: # Manual trigger button in GitHub Actions

permissions:
  contents: write

jobs:
  sync-and-verify:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout this repository ────────────────────────────────
      - name: Checkout OSINT_ChatBot
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 2. Fetch live data from Live_Trackers ──────────────────────
      - name: Fetch data from Live_Trackers
        run: |
          set -euo pipefail
          BASE="https://raw.githubusercontent.com/Leerrooy95/Live_Trackers/main"
          mkdir -p _staging/live_trackers/output

          echo "::group::Fetching output/ (intelligence pipeline results)"
          for file in daily_intelligence.json live_verification.json \
                      node_status.json convergence_report.json \
                      extracted_entities.json fact_check.json; do
            echo "  ↓ $file"
            curl -sSfL -o "_staging/live_trackers/output/$file" \
              "$BASE/output/$file" || true
          done
          echo "::endgroup::"

          # Remove any empty files from failed fetches
          find _staging -type f -empty -delete
          echo "✅ Live Trackers data fetched."

      # ── 3. Fetch static data from The_Regulated_Friction_Project ───
      - name: Fetch Control_Proof from The_Regulated_Friction_Project
        run: |
          set -euo pipefail
          BASE="https://raw.githubusercontent.com/Leerrooy95/The_Regulated_Friction_Project/main"
          mkdir -p _staging/live_trackers/Control_Proof

          echo "::group::Fetching Control_Proof/ (static correlation datasets)"
          curl -sSfL -o _staging/live_trackers/Control_Proof/master_reflexive_correlation_data.csv \
            "$BASE/Control_Proof/master_reflexive_correlation_data.csv" || true

          curl -sSfL -o _staging/live_trackers/Control_Proof/MASTER_reflexive_control_v2.csv \
            "$BASE/Control_Proof/MASTER_reflexive_control_v2.csv" || true

          curl -sSfL -o _staging/live_trackers/Control_Proof/correlation_results.txt \
            "$BASE/Control_Proof/correlation_results.txt" || true
          echo "::endgroup::"

          # Remove any empty files from failed fetches
          find _staging -type f -empty -delete
          echo "✅ Control_Proof data fetched."

      # ── 4. Validate all fetched data ───────────────────────────────
      - name: Validate fetched data
        run: |
          python scripts/validate_sync.py _staging/live_trackers

      # ── 5. Copy verified data to clean _LIVE_DATA/ folder ─────────
      - name: Update clean _LIVE_DATA folder
        run: |
          set -euo pipefail

          # Wipe old data to keep the folder clean
          rm -rf _LIVE_DATA/*

          # Copy verified Live Trackers data
          if [ -d "_staging/live_trackers" ]; then
            cp -r _staging/live_trackers/* _LIVE_DATA/
          fi

          echo "✅ _LIVE_DATA/ updated with verified data."
          echo "--- Contents ---"
          find _LIVE_DATA -type f | head -50

      # ── 6. Generate knowledge-base digest ──────────────────────────
      - name: Generate LIVE_INTELLIGENCE_DIGEST.md
        run: |
          python scripts/generate_digest.py _LIVE_DATA _AI_CONTEXT_INDEX

      # ── 7. Clean up staging ────────────────────────────────────────
      - name: Clean up staging directory
        run: rm -rf _staging

      # ── 8. Commit and push ─────────────────────────────────────────
      - name: Commit and Push Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add _LIVE_DATA/ _AI_CONTEXT_INDEX/LIVE_INTELLIGENCE_DIGEST.md

          if ! git diff --cached --quiet; then
            git commit -m "🤖 Twice-daily sync: live intelligence data + digest update"

            # Robust push with retry
            MAX_RETRIES=5
            for i in $(seq 1 $MAX_RETRIES); do
              echo "--- Push attempt $i of $MAX_RETRIES ---"

              git fetch origin main

              if ! git merge origin/main --no-edit --strategy-option=ours; then
                echo "::warning::Merge failed on attempt $i, retrying..."
                git merge --abort 2>/dev/null || true
                sleep $((i * 2))
                continue
              fi

              if git push origin main; then
                echo "✅ Push succeeded on attempt $i"
                exit 0
              fi

              echo "::warning::Push rejected on attempt $i. Retrying..."
              sleep $((i * 2))
            done

            echo "::error::Failed to push after $MAX_RETRIES attempts"
            exit 1
          else
            echo "No new data changes to commit."
          fi
