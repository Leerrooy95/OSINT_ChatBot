<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Speaker — OSINT ChatBot</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen text-slate-200">
    <div class="bg-slate-800 p-8 rounded-xl shadow-2xl w-[28rem] max-w-full border border-slate-700">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-emerald-400 mb-2">🔱 OSINT ChatBot</h1>
            <p class="text-sm text-slate-400">Bring Your Own Key — enter your Anthropic API key to begin</p>
        </div>
        {% if error %}
            <div class="mb-4 text-sm text-red-400 bg-red-900/30 p-3 rounded border border-red-800">{{ error }}</div>
        {% endif %}
        <form action="/login" method="post" class="space-y-4">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label class="block text-sm font-semibold text-slate-300 mb-1">🔑 Anthropic API Key</label>
                <input type="password" name="api_key" required autofocus
                    placeholder="sk-ant-…"
                    autocomplete="off"
                    class="w-full px-4 py-2 bg-slate-900 border border-slate-600 rounded-md focus:ring-2 focus:ring-emerald-500 text-white outline-none transition font-mono text-sm">
                <p class="mt-2 text-xs text-slate-500">
                    Your key is stored only in your encrypted session and is never saved to disk.
                    <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener"
                       class="text-emerald-400 hover:text-emerald-300 underline">Get a key&nbsp;↗</a>
                </p>
            </div>
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 rounded-md transition duration-200 shadow-md">
                Connect
            </button>
        </form>
    </div>
</body>
</html>
