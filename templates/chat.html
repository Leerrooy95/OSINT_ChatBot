<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Speaker — OSINT ChatBot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked.js for rendering markdown from the agent -->
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
    <!-- DOMPurify to sanitize rendered HTML and prevent XSS -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.5/dist/purify.min.js"></script>
    <style>
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .typing-indicator span {
            display: inline-block;
            width: 6px; height: 6px;
            background-color: #10b981;
            border-radius: 50%;
            animation: typing 1s infinite alternate;
            margin: 0 2px;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0% { transform: translateY(0); opacity: 0.5; }
            100% { transform: translateY(-4px); opacity: 1; }
        }

        /* Markdown prose styling inside assistant bubbles */
        .prose-chat p { margin-bottom: 0.5rem; }
        .prose-chat ul, .prose-chat ol { margin-left: 1.25rem; margin-bottom: 0.5rem; }
        .prose-chat ul { list-style-type: disc; }
        .prose-chat ol { list-style-type: decimal; }
        .prose-chat li { margin-bottom: 0.15rem; }
        .prose-chat code {
            background: rgba(0,0,0,0.3);
            padding: 0.1rem 0.35rem;
            border-radius: 0.25rem;
            font-size: 0.85em;
        }
        .prose-chat pre {
            background: rgba(0,0,0,0.4);
            padding: 0.75rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin-bottom: 0.5rem;
        }
        .prose-chat pre code {
            background: transparent;
            padding: 0;
        }
        .prose-chat a {
            color: #34d399;
            text-decoration: underline;
        }
        .prose-chat h1, .prose-chat h2, .prose-chat h3 {
            font-weight: 700;
            margin-top: 0.75rem;
            margin-bottom: 0.35rem;
        }
        .prose-chat blockquote {
            border-left: 3px solid #475569;
            padding-left: 0.75rem;
            margin-bottom: 0.5rem;
            color: #94a3b8;
        }

        /* Download button on individual messages */
        .msg-download-btn {
            opacity: 0;
            transition: opacity 0.2s;
        }
        .msg-wrapper:hover .msg-download-btn {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 font-sans h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-slate-950 border-b border-slate-800 px-6 py-4 flex justify-between items-center shrink-0 shadow-md z-10">
        <div class="flex items-center space-x-3">
            <span class="text-2xl">🔱</span>
            <div>
                <h1 class="text-lg font-bold text-white leading-tight">The_Speaker</h1>
                <p class="text-xs text-emerald-400 font-mono">BYOK · Knowledge Base Active</p>
            </div>
        </div>
        <div class="flex items-center space-x-2">
            <button id="download-convo-btn" onclick="downloadConversation()" title="Download entire conversation"
                class="text-sm text-slate-400 hover:text-white transition px-3 py-1 rounded hover:bg-slate-800 flex items-center space-x-1 disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5m0 0l5-5m-5 5V3" />
                </svg>
                <span>Save Chat</span>
            </button>
            <a href="/logout" class="text-sm text-slate-400 hover:text-white transition px-3 py-1 rounded hover:bg-slate-800" title="Clear API key and disconnect">🔑 New Key</a>
        </div>
    </header>

    <!-- Chat Area -->
    <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 scroll-smooth pb-32">
        <!-- Initial Greeting -->
        <div class="flex justify-start">
            <div class="max-w-[85%] md:max-w-[75%] bg-slate-800 border border-slate-700 rounded-2xl rounded-tl-sm p-4 shadow-sm text-sm md:text-base leading-relaxed prose-chat">
                <p>System online. OSINT Investigator profile active. I am monitoring the Knowledge Base and live search metrics.</p>
                <p class="mt-2 text-slate-400 text-xs font-mono">Awaiting your query...</p>
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="bg-slate-950 border-t border-slate-800 p-4 shrink-0 absolute bottom-0 w-full z-10 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.3)]">
        <div class="max-w-4xl mx-auto relative flex items-end">
            <textarea id="user-input" rows="1"
                class="w-full bg-slate-800 border border-slate-600 text-white rounded-xl pl-4 pr-14 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent resize-none overflow-hidden transition-all"
                placeholder="Ask The Speaker..."></textarea>
            <button id="send-btn" class="absolute right-2 bottom-2 p-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        const inputField = document.getElementById('user-input');
        const sendBtn    = document.getElementById('send-btn');
        const chatContainer = document.getElementById('chat-container');

        // Client-side memory of the conversation
        let conversationHistory = [];

        // Configure marked for safe rendering
        marked.setOptions({ breaks: true, gfm: true });

        // Auto-resize textarea
        inputField.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight < 120 ? this.scrollHeight : 120) + 'px';
            if (this.value.trim() === '') this.style.height = 'auto';
        });

        // Handle Enter key (Shift+Enter for new line)
        inputField.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function appendMessage(role, content) {
            const isUser = role === 'user';
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${isUser ? 'justify-end' : 'justify-start'} msg-wrapper`;

            const bubble = document.createElement('div');
            bubble.className = `max-w-[85%] md:max-w-[75%] ${
                isUser
                    ? 'bg-emerald-700 text-white rounded-tr-sm'
                    : 'bg-slate-800 border border-slate-700 text-slate-200 rounded-tl-sm prose-chat'
            } rounded-2xl p-4 shadow-sm text-sm md:text-base leading-relaxed`;

            if (isUser) {
                bubble.textContent = content;
            } else {
                // Render markdown for assistant messages, then sanitize
                bubble.innerHTML = DOMPurify.sanitize(marked.parse(content));
            }

            // Wrap bubble and optional download button in a column container
            const col = document.createElement('div');
            col.className = isUser ? 'flex flex-col items-end' : 'flex flex-col items-start';
            col.appendChild(bubble);

            if (!isUser) {
                const dlBtn = document.createElement('button');
                dlBtn.className = 'msg-download-btn mt-1 text-slate-500 hover:text-emerald-400 transition p-1 rounded hover:bg-slate-800 flex items-center space-x-1';
                dlBtn.title = 'Download this reply';
                dlBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5m0 0l5-5m-5 5V3" />
                </svg><span class="text-xs">Save reply</span>`;
                dlBtn.addEventListener('click', function () {
                    const ts = new Date().toISOString().split('.')[0].replace(/[:T]/g, '-');
                    downloadText(content, `speaker-reply-${ts}.md`);
                });
                col.appendChild(dlBtn);
            }

            wrapper.appendChild(col);
            chatContainer.appendChild(wrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // Enable the header download button once there is at least one exchange
            if (conversationHistory.length > 0) {
                document.getElementById('download-convo-btn').disabled = false;
            }
        }

        function showTypingIndicator() {
            const wrapper = document.createElement('div');
            wrapper.id = 'typing-indicator';
            wrapper.className = 'flex justify-start mb-4';
            wrapper.innerHTML = `
                <div class="bg-slate-800 border border-slate-700 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm">
                    <div class="typing-indicator flex items-center h-4">
                        <span></span><span></span><span></span>
                    </div>
                </div>`;
            chatContainer.appendChild(wrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        // --- Download helpers ---------------------------------------------------
        function downloadText(text, filename) {
            const blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function downloadConversation() {
            if (conversationHistory.length === 0) return;
            const ts = new Date().toISOString().split('.')[0].replace(/[:T]/g, '-');
            let md = `# The Speaker — Conversation Export\n\n_Exported: ${new Date().toLocaleString()}_\n\n---\n\n`;
            conversationHistory.forEach(function (msg) {
                const label = msg.role === 'user' ? '**You**' : '**The Speaker**';
                md += `${label}:\n\n${msg.content}\n\n---\n\n`;
            });
            downloadText(md, `speaker-conversation-${ts}.md`);
        }

        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            // 1. Display user message
            inputField.value = '';
            inputField.style.height = 'auto';
            appendMessage('user', text);
            conversationHistory.push({ role: 'user', content: text });

            // 2. Lock input and show typing
            inputField.disabled = true;
            sendBtn.disabled = true;
            showTypingIndicator();

            try {
                // 3. Send history to Flask backend
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: conversationHistory })
                });

                const data = await response.json();
                removeTypingIndicator();

                if (response.ok) {
                    appendMessage('assistant', data.reply);
                    conversationHistory.push({ role: 'assistant', content: data.reply });
                } else {
                    appendMessage('assistant', `⚠️ System Error: ${data.error}`);
                }
            } catch (err) {
                removeTypingIndicator();
                appendMessage('assistant', '⚠️ Connection lost. Unable to reach the server.');
            } finally {
                inputField.disabled = false;
                sendBtn.disabled = false;
                inputField.focus();
            }
        }
    </script>
</body>
</html>
